{% extends "base.html" %}
{% block css %} 
<link rel="stylesheet" href="{{ url_for('static', filename='css/files.css') }}">
{% endblock%}

{% block main %}
<div class="images">
  {% for image in images %}
    <div class="image_item">
      <img src="{{ url_for('get_image', filename=image) }}" width="200">
    </div>
  {% endfor %}
</div>

{% endblock %}
